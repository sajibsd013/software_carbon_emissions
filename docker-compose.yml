services:
  api:
    build:
      context: ./software_carbon_emmisions_api
    ports:
      - "8000:8000"
    env_file:
      - ./software_carbon_emmisions_api/.env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./software_carbon_emmisions_api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload