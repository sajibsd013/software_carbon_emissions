services:
  api:
    build:
      context: ./software_carbon_emissions_api
    ports:
      - "8000:8000"
    env_file:
      - ./software_carbon_emissions_api/.env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./software_carbon_emissions_api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  app:
    build:
      context: ./software_carbon_emissions_app
    ports:
      - "3000:3000"
    volumes:
      - ./software_carbon_emissions_app:/app
      - /app/node_modules
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true 
      - WATCHPACK_POLLING=true
    command: npm run dev -- --host

volumes:
  node_modules: